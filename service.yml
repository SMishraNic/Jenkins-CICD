kind: Service    #defines to create service type object
apiversion: v1
metadata: 
  name: Devops-Project1
  labels: 
     app: Devops-Project1
Spec: 
  Ports: 
   - port: 8080                            #container port exposed
     targetPort: 80                         #Pod port to be exposed
     nodeport: 31200
  Selector:
    app: Devops-Project1                   # Apply this service to any pods which has the specific lable
  type: LoadBalancer                       # Specifies the service type  i.e. Cluster IP or NodePort