kind: Deployment
apiversion: apps/v1
metadata:
   name:Devops-Project1
spec:
   replicas: 2
   selector:    #tell the controller which pods to watch/belongs to
   matchLables:
    app: Devops-Project1
template: 
    metadata:
      labels:
        apps:Devops-Project1
    spec:
     containers:
      - name: Devops-Project1
        image: smishra1nic/pipeline-demo
        imagePullPolicy: Always
        ports:
        - containerPort: 80